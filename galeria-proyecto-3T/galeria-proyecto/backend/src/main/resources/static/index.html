<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Serie C — Galería</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Estilos propios -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ══════════════════════════════════════════════════════════ NAVBAR ══ -->
<nav class="navbar navbar-expand-lg sticky-top px-3 py-2">
    <a class="navbar-brand d-flex align-items-center" href="#">
        <span class="logo-box">S</span>
        <div>
            <span>Serie C</span><br>
            <small class="navbar-text">Plataforma de películas mierderas, series actuales y Torrente</small>
        </div>
    </a>

    <button class="navbar-toggler border-secondary ms-auto" type="button"
            data-bs-toggle="collapse" data-bs-target="#navControls">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse mt-2 mt-lg-0 ms-lg-3" id="navControls">
        <div class="d-flex flex-wrap gap-2 align-items-center w-100">
            <!-- Buscador -->
            <input id="searchInput" type="text" class="form-control"
                   placeholder="Buscar título..." style="max-width:220px">

            <!-- Filtro género -->
            <select id="generoSelect" class="form-select" style="max-width:180px">
                <option value="">Todos los géneros</option>
                <option value="Terror">Terror</option>
                <option value="Comedia">Comedia</option>
                <option value="Ciencia Ficción">Ciencia Ficción</option>
                <option value="Acción">Acción</option>
                <option value="Drama">Drama</option>
                <option value="Intriga">Intriga</option>
                <option value="Fantástico">Fantástico</option>
                <option value="Thriller">Thriller</option>
            </select>

            <!-- Botones -->
            <button id="btnCargar" class="btn btn-outline-light">
                <i class="bi bi-collection-play me-1"></i>Cargar galería
            </button>
            <button id="btnNuevo" class="btn btn-accent" data-bs-toggle="modal" data-bs-target="#modalCrud">
                <i class="bi bi-plus-lg me-1"></i>Añadir
            </button>
            <button id="btnRegistro" class="btn btn-outline-light ms-auto"
                    onclick="window.location.href='registro.html'">
                <i class="bi bi-person me-1"></i>Registrarse
            </button>
        </div>
    </div>
</nav>

<!-- ══════════════════════════════════════════════════════════ MAIN ══════ -->
<main class="container-fluid px-4 py-3" style="max-width:1200px; margin:0 auto;">

    <!-- Barra de estado -->
    <div id="status" class="mb-3">Pulsa <strong>Cargar galería</strong> para mostrar el contenido.</div>

    <!-- Grid de tarjetas -->
    <div id="grid" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-xl-4 g-3"></div>

</main>

<!-- ══════════════════════════════════════════════════ MODAL DETALLE ════ -->
<div class="modal fade" id="modalDetalle" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="detalleTitle">—</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p id="detalleMeta" class="text-secondary mb-2" style="font-size:13px;"></p>
                <p id="detalleDesc" style="font-size:14px; color:#c8d8e8;"></p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-accent"><i class="bi bi-play-fill me-1"></i>Reproducir</button>
                <button class="btn btn-outline-light"><i class="bi bi-bookmark-plus me-1"></i>Mi lista</button>
                <button class="btn btn-outline-light" data-bs-dismiss="modal">Cerrar</button>
            </div>
        </div>
    </div>
</div>

<!-- ═════════════════════════════════ MODAL CREAR / EDITAR (CRUD) ════════ -->
<div class="modal fade" id="modalCrud" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="crudTitle">Añadir elemento</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="crudId">
                <div class="mb-3">
                    <label class="form-label">Título *</label>
                    <input id="crudTitulo" type="text" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Categoría *</label>
                    <input id="crudCategoria" type="text" class="form-control"
                           placeholder="p.ej. Terror - Comedia">
                </div>
                <div class="mb-3">
                    <label class="form-label">Año *</label>
                    <input id="crudAnio" type="number" class="form-control"
                           min="1900" max="2099">
                </div>
                <div class="mb-3">
                    <label class="form-label">Descripción *</label>
                    <textarea id="crudDescripcion" class="form-control" rows="4"></textarea>
                </div>
                <div id="crudError" class="text-danger" style="font-size:13px;"></div>
            </div>
            <div class="modal-footer">
                <button id="btnGuardar" class="btn btn-accent">
                    <i class="bi bi-floppy me-1"></i>Guardar
                </button>
                <button class="btn btn-outline-light" data-bs-dismiss="modal">Cancelar</button>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Lógica de la galería -->
<script src="galeria.js"></script>
</body>
</html>
